<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Login</title>
    <link rel="stylesheet" href="./files/styles.css" />
    <script type="module" src="./files/loginui.js"></script>
  </head>

  <body>
    <header id="site-header"></header>
    <main id="primary-content">
      <aside id="sidebar"></aside>
      <article id="main-stuff-container">
        <form id="select-file-form">
          <label>
            File path:
            <input type="text" id="save-file-path" />
          </label>
          <br />
          <label>
            Which File (1, 2 or 3)?
            <input type="number" min="1" max="3" id="file-number" />
          </label>
          <br />
          <label>
            Would you like to view skulltulas you haven't collected yet?
            <select name="spoiler" id="spoiler">
              <option value="" hidden disabled selected>(Select one)</option>
              <option value="true">Yes</option>
              <option value="false">No</option>
            </select>
          </label>
          <br />
          <button type="submit">Submit</button>
          <button type="reset">Reset</button>
        </form>
      </article>
    </main>
    <footer id="site-footer"></footer>
  </body>
</html>
