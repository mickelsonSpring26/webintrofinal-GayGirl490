<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Skulltula Page</title>
    <link rel="stylesheet" href="./files/styles.css" />
    <script type="module" src="./files/mainui.js"></script>
  </head>

  <body id="body">
    <header id="site-header"></header>
    <main id="primary-content">
      <aside id="sidebar">
        <form id="save-file-upload-form">
          <label>
            Upload your save file:
            <br />
            <input type="file" id="save-file-input" />
          </label>
          <br />
          <button type="submit">Submit (Upload File)</button>
        </form>
        <br />
        <label>
          <input type="checkbox" id="spoiler" />
          Enable Spoiler mode?
        </label>
        <br />
        <label for="area">Filter by Area:</label>
        <select name="area" id="area">
          <option selected value="all">All Areas</option>

          <option value="dungeons">Dungeons</option>
          <option value="miniDungeons">Mini Dungeons</option>
          <option value="overworld">Overworld</option>

          <option value="dekuTree">Inside the Deku Tree</option>
          <option value="dodongoCavern">Dodongo's Cavern</option>
          <option value="jabuJabuBelly">Inside Jabu-Jabu's Belly</option>

          <option value="forestTemple">Forest Temple</option>
          <option value="fireTemple">Fire Temple</option>
          <option value="waterTemple">Water Temple</option>
          <option value="spiritTemple">Spirit Temple</option>
          <option value="shadowTemple">Shadow Temple</option>

          <option value="well">Bottom of the Well</option>
          <option value="iceCavern">Ice Cavern</option>

          <option value="hyruleField">Hyrule Field</option>
          <option value="lonLonRanch">Lon Lon Ranch</option>
          <option value="kokiriForest">Kokiri Forest</option>
          <option value="lostWoods">Lost Woods, Sacred Forest Meadow</option>
          <option value="castle">Castle Town and Ganon's Castle</option>
          <option value="deathMountain">
            Death Mountain Trail, Goron City
          </option>
          <option value="kakarikoVillage">Kakariko Village, Graveyard</option>
          <option value="zora">Zora's Fountain, River, Domain</option>
          <option value="lakeHylia">Lake Hylia</option>
          <option value="gerudoValley">Gerudo Valley</option>
          <option value="gerudoFortress">Gerudo Fortress</option>
          <option value="desert">Desert Colossus, Haunted Wasteland</option>
        </select>
      </aside>
      <article id="main-stuff-container">
        <!-- <a href="./login.html">Go to Login</a>
        <br /> -->
        <section id="collected-container"></section>
        <section id="not-collected-container"></section>
      </article>
    </main>
    <footer id="site-footer"></footer>
  </body>
</html>
